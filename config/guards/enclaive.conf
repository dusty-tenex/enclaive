# enclaive security configuration
# This file is mounted read-only at /etc/sandbox-guards/enclaive.conf
# The agent cannot modify it — only the host operator can.

# Require sidecar for all validation (fail-closed)
# Set to 0 to allow inline fallback when sidecar is unreachable
require_sidecar=1

# Allowed Unicode scripts (comma-separated, empty = Latin only)
# Options: cyrillic, katakana, hiragana, arabic, thai, devanagari, hangul, cjk_unified, runic, ogham
allowed_scripts=

# -----------------------------------------------------------------------
# ML Security Layer Settings
# -----------------------------------------------------------------------

# Enable/disable ML-based detectors (1=enabled, 0=disabled)
# SentinelV2: transformer-based prompt injection classifier
ml_sentinel_v2=1

# PromptGuard2: secondary prompt injection / jailbreak detector
ml_prompt_guard_2=1

# Bash AST parser: structural analysis of shell commands
bash_ast_parser=1

# Detection thresholds (0.0 - 1.0)
# Safe range: 0.70 - 0.95. Values above 0.95 risk false negatives.
# Values below 0.70 may produce excessive false positives.
ml_sentinel_threshold=0.85
ml_prompt_guard_threshold=0.90

# Ensemble mode: what to do when any ML detector triggers
# 'block' = reject the request (fail-closed, recommended)
# 'pass'  = log only, allow the request (for tuning/evaluation)
ml_ensemble_mode=block
