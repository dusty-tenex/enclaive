# enclaive egress proxy — allowlisted domains only
# Add domains your project needs (package registries, APIs, etc.)

# Allowlisted domains
acl allowed_domains dstdomain .anthropic.com
acl allowed_domains dstdomain .github.com
acl allowed_domains dstdomain .githubusercontent.com
acl allowed_domains dstdomain .npmjs.org
acl allowed_domains dstdomain .pypi.org
acl allowed_domains dstdomain .pythonhosted.org
acl allowed_domains dstdomain .docker.com
acl allowed_domains dstdomain .docker.io

# Block RFC 1918 / link-local (metadata endpoints)
acl private_nets dst 10.0.0.0/8
acl private_nets dst 172.16.0.0/12
acl private_nets dst 192.168.0.0/16
acl private_nets dst 169.254.0.0/16
http_access deny private_nets

# Allow only allowlisted destinations
http_access allow allowed_domains
http_access deny all

# Proxy port
http_port 3128

# Logging
access_log stdio:/var/log/squid/access.log
