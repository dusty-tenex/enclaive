name: AI-Powered Tests

on:
  workflow_dispatch:
  push:
    branches: [main]

# Restrict GITHUB_TOKEN to read-only by default
permissions:
  contents: read

jobs:
  ai-tests:
    if: github.repository == 'dusty-tenex/enclaive'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements-test.txt

      - name: Build and start sidecar
        env:
          GUARDRAILS_TOKEN: ${{ secrets.GUARDRAILS_TOKEN }}
        run: |
          DOCKER_BUILDKIT=1 docker compose build guardrails-sidecar
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d guardrails-sidecar

      - name: Wait for sidecar health
        run: |
          echo "Waiting for sidecar to start (workers take ~30-40s to boot)..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health-check > /dev/null 2>&1; then
              echo "Sidecar is healthy (after $((i * 2))s)"
              exit 0
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "Still waiting... ($i/60)"
            fi
            sleep 2
          done
          echo "Sidecar failed to become healthy"
          docker compose ps guardrails-sidecar
          curl -v http://localhost:8000/health-check 2>&1 || true
          docker compose logs guardrails-sidecar
          exit 1

      - name: Run AI-powered tests
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/ -m ai_powered -v --tb=short

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down
