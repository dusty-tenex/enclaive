name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict GITHUB_TOKEN to read-only by default
permissions:
  contents: read

# Cancel redundant runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # master
        with:
          scandir: scripts/

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Python lint with ruff
        run: |
          pip install ruff
          ruff check scripts/

      - name: Node lint
        run: |
          cd cli
          npm ci
          npm run lint

  unit-tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements-test.txt

      - name: Install Hub validators
        env:
          GUARDRAILS_TOKEN: ${{ secrets.GUARDRAILS_TOKEN }}
        run: |
          if [ -n "$GUARDRAILS_TOKEN" ]; then
            guardrails configure --token "$GUARDRAILS_TOKEN" --disable-metrics --disable-remote-inferencing
            guardrails hub install hub://guardrails/secrets_present --quiet
            guardrails hub install hub://guardrails/guardrails_pii --quiet
            guardrails hub install hub://guardrails/detect_jailbreak --quiet
            guardrails hub install hub://guardrails/unusual_prompt --quiet
            guardrails hub install hub://guardrails/detect_pii --quiet
            echo "Hub validators installed"
          else
            echo "GUARDRAILS_TOKEN not set -- Hub validator tests will be skipped"
          fi

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Install CLI dependencies
        run: cd cli && npm ci

      - name: Run pytest unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run bats unit tests
        run: |
          shopt -s nullglob
          files=(tests/unit/*.bats)
          if [ ${#files[@]} -gt 0 ]; then
            bats "${files[@]}"
          else
            echo "No .bats files found -- skipping"
          fi

      - name: Run CLI tests
        run: cd cli && npm test

  integration-tests:
    needs: unit-tests
    # Skip on fork PRs -- integration tests require secrets (GUARDRAILS_TOKEN,
    # FIXTURES_REPO_TOKEN) that are not available to fork pull requests.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout test fixtures
        id: fixtures
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: dusty-tenex/enclaive-test-fixtures
          path: test-fixtures
          token: ${{ secrets.FIXTURES_REPO_TOKEN }}
        continue-on-error: true

      - name: Warn if fixtures unavailable
        if: steps.fixtures.outcome == 'failure'
        run: echo "::warning::Test fixtures repo unavailable -- fixture-driven integration tests will be skipped"

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements-test.txt

      - name: Build sidecar with Hub validators
        env:
          GUARDRAILS_TOKEN: ${{ secrets.GUARDRAILS_TOKEN }}
        run: |
          DOCKER_BUILDKIT=1 docker compose build guardrails-sidecar

      - name: Start sidecar
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d guardrails-sidecar

      - name: Wait for sidecar health
        run: |
          # CI override adds default bridge network so port publishing works
          # (sandbox-net is internal:true, which blocks host access in production)
          echo "Waiting for sidecar to start (workers take ~30-40s to boot)..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health-check > /dev/null 2>&1; then
              echo "Sidecar is healthy (after $((i * 2))s)"
              exit 0
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "Still waiting... ($i/60)"
            fi
            sleep 2
          done
          echo "Sidecar failed to become healthy"
          docker compose ps guardrails-sidecar
          curl -v http://localhost:8000/health-check 2>&1 || true
          docker compose logs guardrails-sidecar
          exit 1

      - name: Run integration tests
        env:
          GUARDRAILS_SIDECAR_URL: http://localhost:8000
          TEST_FIXTURES_DIR: test-fixtures
        run: pytest tests/integration/ -v --tb=short

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down
